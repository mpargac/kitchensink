name: Unit Test Pipeline

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    test:
        name: Build & Run Unit Tests
        runs-on: ubuntu-latest

        steps:
            # 1. Pull down the repository code
            - name: Checkout Code
              uses: actions/checkout@v4

            # 2. Provision Java 21 environment with dependency caching
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'maven' # Automatically caches your .m2 directory to speed up subsequent runs

            # 3. Execute Maven lifecycle for unit testing
            - name: Run Unit Tests with Maven
              run: ./mvnw clean test
